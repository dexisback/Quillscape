<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Quillscape">
  <!-- Cream backing (matches app chrome) -->
  <rect width="100" height="100" rx="20" fill="#f4f0e8"/>
  <!-- Outer tan ring (full disk; inner black reveals the ring) -->
  <circle cx="50" cy="50" r="44" fill="#d4a574"/>
  <!-- Dark center -->
  <circle cx="50" cy="50" r="29" fill="#262626"/>
  <!-- Tan highlights on the dark disk (original “eye” marks) -->
  <circle cx="58" cy="41" r="9" fill="#d4a574"/>
  <circle cx="55" cy="58" r="5.5" fill="#d4a574"/>
</svg>
